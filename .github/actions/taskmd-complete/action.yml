name: 'taskmd Complete on Merge'
description: 'Marks a taskmd task as completed when its associated PR is merged'

inputs:
  task-dir:
    description: 'Directory containing task files'
    required: false
    default: '.'
  task-id-pattern:
    description: 'Regex pattern to extract task ID from PR body or branch name. Must have a capture group.'
    required: false
    default: 'task[:\s]+(\S+)'
  taskmd-version:
    description: 'Version of taskmd to install (e.g., "latest" or "0.0.9")'
    required: false
    default: 'latest'
  dry-run:
    description: 'If true, print what would happen without making changes'
    required: false
    default: 'false'

runs:
  using: 'composite'
  steps:
    - name: Extract task ID from PR
      id: extract
      shell: bash
      env:
        PR_BODY: ${{ github.event.pull_request.body }}
        PR_BRANCH: ${{ github.event.pull_request.head.ref }}
        PATTERN: ${{ inputs.task-id-pattern }}
      run: |
        TASK_ID=""
        # Try PR body first
        if [[ -n "$PR_BODY" ]]; then
          TASK_ID=$(echo "$PR_BODY" | grep -oP "$PATTERN" | head -1 | sed -E "s/$PATTERN/\1/")
        fi
        # Fall back to branch name
        if [[ -z "$TASK_ID" && -n "$PR_BRANCH" ]]; then
          TASK_ID=$(echo "$PR_BRANCH" | grep -oP "$PATTERN" | head -1 | sed -E "s/$PATTERN/\1/")
        fi
        if [[ -z "$TASK_ID" ]]; then
          echo "::warning::Could not extract task ID from PR body or branch name"
          echo "found=false" >> "$GITHUB_OUTPUT"
          exit 0
        fi
        echo "task_id=$TASK_ID" >> "$GITHUB_OUTPUT"
        echo "found=true" >> "$GITHUB_OUTPUT"

    - name: Install taskmd
      if: steps.extract.outputs.found == 'true' && inputs.dry-run != 'true'
      shell: bash
      env:
        VERSION: ${{ inputs.taskmd-version }}
      run: |
        if [[ "$VERSION" == "latest" ]]; then
          go install github.com/driangle/taskmd/apps/cli/cmd/taskmd@latest
        else
          go install "github.com/driangle/taskmd/apps/cli/cmd/taskmd@v${VERSION}"
        fi

    - name: Mark task as completed
      if: steps.extract.outputs.found == 'true' && inputs.dry-run != 'true'
      shell: bash
      env:
        TASK_ID: ${{ steps.extract.outputs.task_id }}
        TASK_DIR: ${{ inputs.task-dir }}
      run: |
        taskmd set "$TASK_ID" --status completed --task-dir "$TASK_DIR"

    - name: Commit and push
      if: steps.extract.outputs.found == 'true' && inputs.dry-run != 'true'
      shell: bash
      env:
        TASK_ID: ${{ steps.extract.outputs.task_id }}
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add -A
        if git diff --cached --quiet; then
          echo "No changes to commit"
          exit 0
        fi
        git commit -m "chore: mark task $TASK_ID as completed [skip ci]"
        git push

    - name: Dry-run summary
      if: steps.extract.outputs.found == 'true' && inputs.dry-run == 'true'
      shell: bash
      env:
        TASK_ID: ${{ steps.extract.outputs.task_id }}
        TASK_DIR: ${{ inputs.task-dir }}
      run: |
        echo "::notice::Dry-run: would mark task $TASK_ID as completed in $TASK_DIR"
